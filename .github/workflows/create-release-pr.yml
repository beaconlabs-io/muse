name: Create Release PR
on:
  push:
    branches: [dev]

permissions:
  contents: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for existing PR
        id: check-pr
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          existing_pr=$(gh pr list --base main --head dev --json number --jq '.[0].number // ""')
          echo "existing_pr=$existing_pr" >> $GITHUB_OUTPUT

      - name: Generate release summary
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          {
            echo "## 🚀 Release $(date +'%Y-%m-%d')"
            echo ""
            echo "### Changes"
            echo ""

            # List merged PRs with nested sub-PRs
            git log main..dev --merges --first-parent --pretty=format:"%H %s" \
              | while read -r sha rest; do
                  pr_num=$(echo "$rest" | grep -oE 'Merge pull request #[0-9]+' | sed 's/Merge pull request #//')
                  [ -z "$pr_num" ] && continue
                  title=$(gh pr view "$pr_num" --json title --jq '.title')
                  case "$title" in *Release*) continue ;; esac
                  echo "- ${title} (#${pr_num})"

                  # Find sub-PRs within this merge
                  merge_base=$(git merge-base "${sha}^1" "${sha}^2" 2>/dev/null) || continue
                  git log "${merge_base}..${sha}^2" --merges --first-parent --pretty=format:"%s" 2>/dev/null \
                    | grep -v 'from beaconlabs-io/dev' \
                    | grep -v 'Merge branch' \
                    | grep -oE 'Merge pull request #[0-9]+' \
                    | sed 's/Merge pull request #//' \
                    | while read -r sub_pr; do
                        sub_title=$(gh pr view "$sub_pr" --json title --jq '.title')
                        echo "  - ${sub_title} (#${sub_pr})"
                      done
                done

            # List direct (non-merge) commits not part of a merged PR branch
            git log main..dev --no-merges --first-parent --pretty=format:"- %s"

            echo ""
            echo ""
            echo "---"
            echo "🤖 *Automatically generated by GitHub Actions*"
          } > pr_body.md

      - name: Create Release PR
        if: steps.check-pr.outputs.existing_pr == ''
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr create \
            --base main \
            --head dev \
            --title "🚀 Release $(date +'%Y-%m-%d')" \
            --body-file pr_body.md \
            --label "🏷️ release" \
            --label "🤖 automated"

      - name: Update existing Release PR
        if: steps.check-pr.outputs.existing_pr != ''
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr edit ${{ steps.check-pr.outputs.existing_pr }} \
            --body-file pr_body.md
